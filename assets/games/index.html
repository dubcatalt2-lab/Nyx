<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nyx Games</title>
  <style>
    :root{
      --bg:#0b0f17;
      --panel:rgba(11,15,23,.78);
      --text:#f8fafc;
      --muted:#a8b3c7;
      --line:#f87171;
    }
    *{box-sizing:border-box;font-weight:400!important;font-style:normal!important}
    html,body{height:100%;margin:0}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:Outfit,Arial,sans-serif;
      overflow:hidden;
    }
    .games-shell{
      height:100%;
      display:grid;
      grid-template-rows:auto 1fr;
    }
    .games-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      padding:16px 18px;
      background:var(--panel);
      border-bottom:1px solid var(--line);
    }
    h1{
      margin:0;
      font-size:24px;
      font-weight:400;
      letter-spacing:0;
    }
    .games-home{
      appearance:none;
      border:0;
      background:transparent;
      color:inherit;
      padding:0;
      font:inherit;
      cursor:pointer;
      text-align:left;
    }
    .games-home:hover{
      color:#fca5a5;
    }
    p{
      margin:4px 0 0;
      color:var(--muted);
      font-size:14px;
    }
    label{
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
    }
    select{
      min-width:150px;
      border:1px solid var(--line);
      background:#121722;
      color:var(--text);
      border-radius:10px;
      padding:9px 12px;
      font:inherit;
      outline:none;
    }
    .games-actions{
      display:flex;
      align-items:center;
      gap:10px;
    }
    .fullscreen-btn{
      min-width:42px;
      height:40px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#121722;
      color:var(--text);
      font:18px/1 Outfit,Arial,sans-serif;
      cursor:pointer;
      transition:transform .18s ease,border-color .18s ease;
    }
    .fullscreen-btn:hover{
      transform:scale(1.04);
      border-color:#fca5a5;
    }
    iframe{
      width:100%;
      height:100%;
      border:0;
      background:#0b0f17;
    }
    .games-shell.playing{
      display:block;
    }
    .games-shell.playing .games-top{
      display:none;
    }
    .games-shell.playing iframe{
      position:fixed;
      inset:0;
      z-index:1;
      width:100vw;
      height:100vh;
    }
    .host-loading{
      position:fixed;
      inset:auto 18px 18px 18px;
      z-index:5;
      display:none;
      padding:12px 14px;
      border:1px solid var(--line);
      background:rgba(11,15,23,.9);
      color:var(--text);
    }
    .host-loading.active{display:block}
    .host-loading-top{
      display:flex;
      justify-content:space-between;
      gap:14px;
      margin-bottom:8px;
      font-size:13px;
    }
    .host-loading-track{
      height:5px;
      overflow:hidden;
      background:rgba(248,250,252,.15);
    }
    .host-loading-fill{
      width:0;
      height:100%;
      background:var(--line);
      transition:width .18s ease;
    }
    @media (max-width:640px){
      .games-top{align-items:flex-start;flex-direction:column}
      label,select,.games-actions{width:100%}
      .fullscreen-btn{width:100%}
    }
  </style>
</head>
<body>
  <div class="games-shell">
    <header class="games-top">
      <div>
        <h1><button id="gamesHome" class="games-home" type="button">Games</button></h1>
        <p>Choose a game host.</p>
      </div>
      <div class="games-actions">
        <label>
          Game Host
          <select id="hostSelect">
            <option value="ugs">UGS</option>
            <option value="seraph">Seraph</option>
            <option value="gn-math">GN Math</option>
            <option value="gms-games">GMS Games</option>
          </select>
        </label>
        <button id="fullscreenBtn" class="fullscreen-btn" type="button" title="Fullscreen games" aria-label="Fullscreen games">⛶</button>
      </div>
    </header>
    <iframe id="hostFrame" title="Game host" allow="fullscreen; gamepad; autoplay; pointer-lock; keyboard-map; clipboard-read; clipboard-write; camera; microphone; display-capture; accelerometer; gyroscope; magnetometer; xr-spatial-tracking" allowfullscreen tabindex="0"></iframe>
    <div id="hostLoading" class="host-loading" aria-live="polite">
      <div class="host-loading-top">
        <span id="hostLoadingLabel">Loading</span>
        <span id="hostLoadingPercent">0%</span>
      </div>
      <div class="host-loading-track"><div id="hostLoadingFill" class="host-loading-fill"></div></div>
    </div>
  </div>
  <script>
    const hosts={
      ugs:{name:'UGS',url:'/assets/ugs/index.html'},
      seraph:{name:'Seraph',url:'/assets/seraph/index.html'},
      'gn-math':{name:'GN Math',url:'/assets/gn-math/index.html'},
      'gms-games':{name:'GMS Games',url:'/assets/gms-games/index.html'}
    };
    const hostVersion='20260630-game-fit-v4';
    const select=document.getElementById('hostSelect');
    const frame=document.getElementById('hostFrame');
    const shell=document.querySelector('.games-shell');
    const gamesHome=document.getElementById('gamesHome');
    const fullscreenBtn=document.getElementById('fullscreenBtn');
    const hostLoading=document.getElementById('hostLoading');
    const hostLoadingLabel=document.getElementById('hostLoadingLabel');
    const hostLoadingPercent=document.getElementById('hostLoadingPercent');
    const hostLoadingFill=document.getElementById('hostLoadingFill');
    const hostAliases={'reds-misc':'gms-games'};
    const savedRaw=hostAliases[localStorage.getItem('nyx.gameHost')] || localStorage.getItem('nyx.gameHost') || 'ugs';
    const saved=hosts[savedRaw] ? savedRaw : 'ugs';
    let loadTimer=0;
    let lastFrameUrl='';
    function focusHostFrame(){
      setTimeout(()=>{try{frame.focus({preventScroll:true})}catch{try{frame.focus()}catch{}}},0);
    }
    function installPointerBridgeInDocument(doc){
      try{
        if(!doc || doc.__nyxPointerBridge) return;
        doc.__nyxPointerBridge=true;
        const style=doc.createElement('style');
        style.textContent='html.nyx-pointer-captured,html.nyx-pointer-captured *{cursor:none!important}';
        (doc.head || doc.documentElement).appendChild(style);
        const query='canvas,video,object,embed,ruffle-player,ruffle-object,iframe,#game,#game-container,#unity-container,#unity-canvas,#player,[class*="game" i],[class*="stream" i],[id*="game" i],[id*="stream" i]';
        const isEditing=target=>!!(target && (target.isContentEditable || /^(INPUT|TEXTAREA|SELECT)$/i.test(target.tagName || '')));
        const requestPointer=event=>{
          try{
            if(isEditing(event.target)) return;
            const target=event.target?.closest?.(query) || doc.querySelector('canvas,video,object,embed,iframe') || doc.documentElement;
            target.focus?.({preventScroll:true});
            try{
              if(!doc.pointerLockElement && target.requestPointerLock){
                const lock=target.requestPointerLock({unadjustedMovement:true});
                lock?.catch?.(()=>{try{target.requestPointerLock?.()}catch{}});
              }
            }catch{
              try{target.requestPointerLock?.()}catch{}
            }
            doc.documentElement.classList.add('nyx-pointer-captured');
          }catch{}
        };
        doc.addEventListener('pointerdown',requestPointer,true);
        doc.addEventListener('click',requestPointer,true);
        doc.addEventListener('pointerlockchange',()=>doc.documentElement.classList.toggle('nyx-pointer-captured',!!doc.pointerLockElement));
        doc.addEventListener('keydown',event=>{
          const key=String(event.key || '').toLowerCase();
          if(event.altKey && !event.ctrlKey && !event.metaKey && event.location!==2 && key==='alt'){
            event.preventDefault();
            event.stopPropagation();
            try{parent.postMessage({type:'nyx:alt-prime'},'*')}catch{}
            try{top.postMessage({type:'nyx:alt-prime'},'*')}catch{}
            return;
          }
          if(event.altKey && !event.ctrlKey && !event.metaKey && event.location!==2 && (/^[1-9]$/.test(key) || ['l','d','t','w','r','arrowleft','arrowright','tab'].includes(key))){
            event.preventDefault();
            event.stopPropagation();
            try{parent.postMessage({type:'nyx:alt-shortcut',key,code:event.code||'',location:event.location||0,shiftKey:!!event.shiftKey},'*')}catch{}
            try{top.postMessage({type:'nyx:alt-shortcut',key,code:event.code||'',location:event.location||0,shiftKey:!!event.shiftKey},'*')}catch{}
            return;
          }
          if(event.key==='Escape') doc.documentElement.classList.remove('nyx-pointer-captured');
        },true);
      }catch{}
    }
    function installHostPointerBridge(){
      try{
        installPointerBridgeInDocument(frame.contentDocument);
        frame.contentDocument?.querySelectorAll?.('iframe')?.forEach(child=>{
          try{installPointerBridgeInDocument(child.contentDocument)}catch{}
        });
      }catch{}
    }
    frame.addEventListener('load',()=>{
      setTimeout(focusHostFrame,80);
      setTimeout(installHostPointerBridge,250);
      setTimeout(installHostPointerBridge,1200);
    });
    setInterval(installHostPointerBridge,1800);
    frame.addEventListener('pointerdown',focusHostFrame,{capture:true});
    document.addEventListener('pointerdown',event=>{
      if(event.target===frame || event.target.closest?.('.games-shell')) focusHostFrame();
    },true);
    document.addEventListener('wheel',event=>{
      if(event.ctrlKey) event.preventDefault();
    },{capture:true,passive:false});
    document.addEventListener('keydown',event=>{
      const key=String(event.key || '').toLowerCase();
      if(event.altKey && !event.ctrlKey && !event.metaKey && event.location!==2 && key==='alt'){
        event.preventDefault();
        event.stopPropagation();
        try{parent.postMessage({type:'nyx:alt-prime'},'*')}catch{}
        try{top.postMessage({type:'nyx:alt-prime'},'*')}catch{}
        return;
      }
      if((event.ctrlKey || event.metaKey) && ['+','=','-','_','0'].includes(key)){
        event.preventDefault();
        event.stopPropagation();
      }
    },true);
    function setHostProgress(value,label='Loading'){
      const percent=Math.max(0,Math.min(100,Math.round(value)));
      hostLoading.classList.add('active');
      hostLoadingLabel.textContent=percent>=100 ? 'Launched' : label;
      hostLoadingPercent.textContent=`${percent}%`;
      hostLoadingFill.style.width=`${percent}%`;
    }
    function beginHostProgress(){
      clearInterval(loadTimer);
      let progress=8;
      setHostProgress(progress);
      loadTimer=setInterval(()=>{
        progress=Math.min(92,progress + Math.max(1,(94-progress)*.12));
        setHostProgress(progress);
      },180);
    }
    function finishHostProgress(){
      clearInterval(loadTimer);
      setHostProgress(100,'Launched');
      setTimeout(()=>hostLoading.classList.remove('active'),520);
    }
    function loadHost(key){
      key=hostAliases[key] || key;
      const host=hosts[key] || hosts.ugs;
      select.value=hosts[key] ? key : 'ugs';
      localStorage.setItem('nyx.gameHost',select.value);
      document.title=`nyx Games - ${host.name}`;
      shell.classList.remove('playing');
      beginHostProgress();
      frame.src=`${host.url}?v=${hostVersion}`;
    }
    gamesHome.addEventListener('click',()=>loadHost(select.value));
    select.addEventListener('change',()=>loadHost(select.value));
    async function toggleFullscreen(){
      try{
        if(document.fullscreenElement){
          await document.exitFullscreen();
          return;
        }
        const target=frame || document.documentElement;
        if(target.requestFullscreen) await target.requestFullscreen();
        else await document.documentElement.requestFullscreen();
      }catch{
        try{await document.documentElement.requestFullscreen()}catch{}
      }
    }
    function updateFullscreenButton(){
      fullscreenBtn.textContent=document.fullscreenElement ? '×' : '⛶';
      fullscreenBtn.title=document.fullscreenElement ? 'Exit fullscreen' : 'Fullscreen games';
      fullscreenBtn.setAttribute('aria-label',fullscreenBtn.title);
    }
    fullscreenBtn.addEventListener('click',toggleFullscreen);
    document.addEventListener('fullscreenchange',updateFullscreenButton);
    window.addEventListener('message',event=>{
      if(event.source!==frame.contentWindow) return;
      if(event.data?.type==='nyx:game-loading') hostLoading.classList.remove('active');
    });
    frame.addEventListener('load',()=>{
      let current='';
      try{current=frame.contentWindow.location.href}catch{current=frame.src}
      shell.classList.toggle('playing',/\/assets\/(?:gn-math|gms-games|seraph|ugs)\/play\.html/i.test(current));
      if(current && current!==lastFrameUrl){
        lastFrameUrl=current;
        finishHostProgress();
      }
    });
    loadHost(saved);
  </script>
</body>
</html>
