<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GMS Games</title>
  <style>
    :root{--bg:#0b0f17;--panel:rgba(15,23,42,.72);--text:#f8fafc;--muted:#a8b3c7;--line:#fb7185}
    *{box-sizing:border-box;font-weight:400!important;font-style:normal!important}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Outfit,Arial,sans-serif}
    header{position:sticky;top:0;z-index:3;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 20px;background:rgba(11,15,23,.94);border-bottom:1px solid var(--line)}
    h1{margin:0;font-size:26px;letter-spacing:0}
    .source{margin-top:4px;color:var(--muted);font-size:13px}
    .search{width:min(390px,42vw);border:1px solid var(--line);border-radius:12px;background:#121722;color:var(--text);padding:11px 13px;font:inherit;outline:none}
    main{padding:22px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
    .card{display:flex;flex-direction:column;gap:10px;min-height:168px;padding:12px;border:1px solid rgba(251,113,133,.48);border-radius:14px;background:var(--panel);color:var(--text);text-align:left;cursor:pointer;transition:transform .2s ease,border-color .2s ease,background .2s ease}
    .card:hover{transform:translateY(-2px) scale(1.012);border-color:var(--line);background:rgba(30,41,59,.82)}
    .thumb{width:100%;aspect-ratio:16/10;object-fit:cover;border-radius:10px;background:#111827}
    .thumb.broken{display:none}
    .thumb-fallback{width:100%;aspect-ratio:16/10;display:none;place-items:center;border-radius:10px;background:linear-gradient(135deg,#111827,#31212b);color:#fb7185;font-size:28px}
    .thumb-fallback.generated,.thumb.broken+.thumb-fallback{display:grid}
    .name{font-size:14px;line-height:1.25}
    .meta{color:var(--muted);font-size:12px}
    .empty{display:none;color:var(--muted);padding:26px 0}
    @media (max-width:640px){header{align-items:stretch;flex-direction:column}.search{width:100%}main{padding:14px}.grid{grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:12px}}
  </style>
</head>
<body>
  <header>
    <div>
      <h1>GMS Games</h1>
      <div class="source" id="source">Loading game library...</div>
    </div>
    <input id="search" class="search" placeholder="Search GMS games" autocomplete="off">
  </header>
  <main>
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty">No games found.</div>
  </main>
  <script>
    const grid=document.getElementById('grid');
    const empty=document.getElementById('empty');
    const search=document.getElementById('search');
    const source=document.getElementById('source');
    let games=[];
    function gameUrl(game){
      if(game.type==='gba' && game.romId) return new URL(`/assets/gms-games/play.html?gba=${encodeURIComponent(game.romId)}`,location.origin).href;
      return new URL(`/assets/gms-games/play.html?game=${encodeURIComponent(game.path)}`,location.origin).href;
    }
    function coverUrl(url){
      if(!url) return '';
      try{
        const parsed=new URL(url,location.href);
        if(['raw.githubusercontent.com','cdn.jsdelivr.net','rawcdn.githack.com','raw.githack.com'].includes(parsed.hostname)){
          return `/gms-games-proxy?url=${encodeURIComponent(parsed.href)}`;
        }
        return parsed.href;
      }catch{
        return url;
      }
    }
    function render(){
      const term=search.value.trim().toLowerCase();
      const shown=games.filter(game=>!term || `${game.title} ${game.id}`.toLowerCase().includes(term));
      grid.innerHTML=shown.map(game=>`
        <button class="card" type="button" data-url="${game.url}">
          ${game.cover ? `<img class="thumb" alt="" loading="lazy" src="${game.cover}">` : '<span class="thumb broken" aria-hidden="true"></span>'}
          <span class="thumb-fallback ${game.cover ? '' : 'generated'}" aria-hidden="true">${game.title.slice(0,1).toUpperCase()}</span>
          <span class="name">${game.title}</span>
          <span class="meta">${game.id}</span>
        </button>
      `).join('');
      empty.style.display=shown.length ? 'none' : 'block';
    }
    grid.addEventListener('click',event=>{
      const card=event.target.closest('[data-url]');
      if(card){
        parent.postMessage({type:'nyx:game-loading'},'*');
        location.href=card.dataset.url;
      }
    });
    grid.addEventListener('error',event=>{
      if(event.target?.classList?.contains('thumb')) event.target.classList.add('broken');
    },true);
    search.addEventListener('input',render);
    fetch('/assets/gms-games/games.json',{cache:'no-store'})
      .then(response=>response.json())
      .then(data=>{
        games=(Array.isArray(data.games) ? data.games : []).map(game=>({...game,url:gameUrl(game),cover:coverUrl(game.cover)}));
        source.textContent=`${games.length} games from GMS Games.`;
        render();
      })
      .catch(()=>{
        source.textContent='Could not load GMS Games.';
        empty.textContent='Could not load the GMS Games list.';
        empty.style.display='block';
      });
  </script>
</body>
</html>
