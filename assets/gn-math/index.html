<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GN Math Games</title>
  <style>
    :root{
      --bg:#0b0f17;
      --panel:rgba(15,23,42,.72);
      --text:#f8fafc;
      --muted:#a8b3c7;
      --line:#a78bfa;
    }
    *{box-sizing:border-box;font-weight:400!important;font-style:normal!important}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Outfit,Arial,sans-serif}
    header{
      position:sticky;
      top:0;
      z-index:3;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:18px 20px;
      background:rgba(11,15,23,.94);
      border-bottom:1px solid var(--line);
    }
    h1{margin:0;font-size:26px;letter-spacing:0}
    .source{margin-top:4px;color:var(--muted);font-size:13px}
    .search{
      width:min(390px,42vw);
      border:1px solid var(--line);
      border-radius:12px;
      background:#121722;
      color:var(--text);
      padding:11px 13px;
      font:inherit;
      outline:none;
    }
    main{padding:22px}
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
      gap:16px;
    }
    .card{
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:168px;
      padding:12px;
      border:1px solid rgba(167,139,250,.48);
      border-radius:14px;
      background:var(--panel);
      color:var(--text);
      text-align:left;
      cursor:pointer;
      transition:transform .2s ease,border-color .2s ease,background .2s ease;
    }
    .card:hover{
      transform:translateY(-2px) scale(1.012);
      border-color:var(--line);
      background:rgba(30,41,59,.82);
    }
    .thumb{
      width:100%;
      aspect-ratio:16/10;
      object-fit:cover;
      border-radius:10px;
      background:#111827;
    }
    .thumb.broken{display:none}
    .thumb-fallback{
      width:100%;
      aspect-ratio:16/10;
      display:none;
      place-items:center;
      border-radius:10px;
      background:
        radial-gradient(circle at 20% 20%,rgba(167,139,250,.36),transparent 32%),
        radial-gradient(circle at 82% 76%,rgba(244,114,182,.28),transparent 34%),
        linear-gradient(135deg,#111827,#1e293b);
      color:#c4b5fd;
      font-size:28px;
    }
    .thumb-fallback.generated{display:grid}
    .thumb.broken + .thumb-fallback{display:grid}
    .name{font-size:14px;line-height:1.25}
    .meta{color:var(--muted);font-size:12px}
    .empty{display:none;color:var(--muted);padding:26px 0}
    @media (max-width:640px){
      header{align-items:stretch;flex-direction:column}
      .search{width:100%}
      main{padding:14px}
      .grid{grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:12px}
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>GN Math Games</h1>
      <div class="source" id="source">Loading game library...</div>
    </div>
    <input id="search" class="search" placeholder="Search GN Math games" autocomplete="off">
  </header>
  <main>
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty">No games found.</div>
  </main>
  <script>
    const grid=document.getElementById('grid');
    const empty=document.getElementById('empty');
    const search=document.getElementById('search');
    const source=document.getElementById('source');
    let games=[];

    function titleFromPath(path,title){
      if(title) return title;
      const clean=String(path || '').replace(/\.html?$/i,'');
      const id=(clean.match(/^\d+/) || [''])[0];
      return id ? `GN Math ${id}` : clean.replace(/[-_]+/g,' ');
    }

    function gameUrl(path){
      return new URL(`/assets/gn-math/play.html?game=${encodeURIComponent(path)}`,location.origin).href;
    }

    function render(){
      const term=search.value.trim().toLowerCase();
      const shown=games.filter(game=>{
        const haystack=`${game.title} ${game.path}`.toLowerCase();
        return !term || haystack.includes(term);
      });
      grid.innerHTML=shown.map(game=>`
        <button class="card" type="button" data-url="${game.url}" data-path="${game.path}">
          ${game.cover ? `<img class="thumb" alt="" loading="lazy" src="${game.cover}" data-fallback="${game.coverFallback || ''}">` : '<span class="thumb broken" aria-hidden="true"></span>'}
          <span class="thumb-fallback ${game.cover ? '' : 'generated'}" aria-hidden="true">${game.title.slice(0,1).toUpperCase()}</span>
          <span class="name">${game.title}</span>
          <span class="meta">${game.path}</span>
        </button>
      `).join('');
      empty.style.display=shown.length ? 'none' : 'block';
    }

    grid.addEventListener('click',event=>{
      const card=event.target.closest('[data-url]');
      if(card){
        parent.postMessage({type:'nyx:game-loading'},'*');
        location.href=card.dataset.url;
      }
    });
    grid.addEventListener('error',event=>{
      const target=event.target;
      if(!target?.classList?.contains('thumb')) return;
      const fallback=target.dataset.fallback;
      if(fallback && target.src!==fallback){
        target.dataset.fallback='';
        target.src=fallback;
        return;
      }
      target.classList.add('broken');
    },true);
    search.addEventListener('input',render);

    fetch('/assets/gn-math/games.json',{cache:'no-store'})
      .then(response=>response.json())
      .then(data=>{
        games=(Array.isArray(data.games) ? data.games : []).map(game=>({
          ...game,
          title:titleFromPath(game.path,game.title),
          url:gameUrl(game.path)
        })).sort((a,b)=>a.path.localeCompare(b.path,undefined,{numeric:true}));
        source.textContent=`${games.length} games from GN Math.`;
        render();
      })
      .catch(()=>{
        source.textContent='Could not load GN Math.';
        empty.textContent='Could not load the GN Math game list.';
        empty.style.display='block';
      });
  </script>
</body>
</html>
