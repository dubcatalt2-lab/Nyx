<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GN Math Game</title>
  <style>
    *{box-sizing:border-box;font-weight:400!important;font-style:normal!important}
    html,body{height:100%;margin:0;background:#0b0f17;color:#f8fafc;font-family:Outfit,Arial,sans-serif}
    .loading{
      position:fixed;
      inset:0;
      z-index:2;
      display:grid;
      place-items:center;
      padding:24px;
      background:#0b0f17;
      text-align:center;
    }
    .loading.hidden{display:none}
    .box{
      max-width:540px;
      width:min(540px,calc(100vw - 48px));
      border:1px solid #a78bfa;
      border-radius:16px;
      padding:24px;
      background:#111827;
    }
    .progress-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:10px;
      color:#f8fafc;
      font-size:15px;
    }
    .progress-track{
      height:6px;
      overflow:hidden;
      border-radius:999px;
      background:rgba(248,250,252,.14);
    }
    .progress-fill{
      width:0;
      height:100%;
      border-radius:999px;
      background:#a78bfa;
      transition:width .2s ease;
    }
    .box button{
      margin-top:14px;
      border:1px solid #a78bfa;
      border-radius:10px;
      background:#0f172a;
      color:#f8fafc;
      padding:9px 14px;
      font:inherit;
      cursor:pointer;
    }
    .game-frame{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      background:#0b0f17;
    }
  </style>
</head>
<body>
  <div class="loading">
    <div class="box" id="status">
      <div class="progress-row">
        <span id="progressLabel">Loading</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>
  <iframe id="gameFrame" class="game-frame" title="GN Math game" allow="fullscreen; gamepad; autoplay; pointer-lock; keyboard-map; clipboard-read; clipboard-write; camera; microphone; display-capture; accelerometer; gyroscope; magnetometer; xr-spatial-tracking" allowfullscreen tabindex="0"></iframe>
  <script>
    const loading=document.querySelector('.loading');
    const status=document.getElementById('status');
    const progressLabel=document.getElementById('progressLabel');
    const progressPercent=document.getElementById('progressPercent');
    const progressFill=document.getElementById('progressFill');
    const frame=document.getElementById('gameFrame');
    function focusGameFrame(){
      setTimeout(()=>{try{frame.focus({preventScroll:true})}catch{try{frame.focus()}catch{}}},0);
    }
    function installPointerBridgeInDocument(doc){
      try{
        if(!doc || doc.__nyxPointerBridge) return;
        doc.__nyxPointerBridge=true;
        const style=doc.createElement('style');
        style.textContent='html.nyx-pointer-captured,html.nyx-pointer-captured *{cursor:none!important}';
        (doc.head || doc.documentElement).appendChild(style);
        const query='canvas,video,object,embed,ruffle-player,ruffle-object,iframe,#game,#game-container,#unity-container,#unity-canvas,#ruffle,#player,[class*="game" i],[class*="stream" i],[id*="game" i],[id*="stream" i]';
        const isEditing=target=>!!(target && (target.isContentEditable || /^(INPUT|TEXTAREA|SELECT)$/i.test(target.tagName || '')));
        const requestPointer=event=>{
          try{
            if(isEditing(event.target)) return;
            const target=event.target?.closest?.(query) || doc.querySelector('canvas,video,object,embed,iframe') || doc.documentElement;
            target.focus?.({preventScroll:true});
            try{
              if(!doc.pointerLockElement && target.requestPointerLock){
                const lock=target.requestPointerLock({unadjustedMovement:true});
                lock?.catch?.(()=>{try{target.requestPointerLock?.()}catch{}});
              }
            }catch{
              try{target.requestPointerLock?.()}catch{}
            }
            doc.documentElement.classList.add('nyx-pointer-captured');
          }catch{}
        };
        doc.addEventListener('pointerdown',requestPointer,true);
        doc.addEventListener('click',requestPointer,true);
        doc.addEventListener('pointerlockchange',()=>doc.documentElement.classList.toggle('nyx-pointer-captured',!!doc.pointerLockElement));
        doc.addEventListener('keydown',event=>{
          const key=String(event.key || '').toLowerCase();
          if(event.altKey && !event.ctrlKey && !event.metaKey && event.location!==2 && key==='alt'){
            event.preventDefault();
            event.stopPropagation();
            try{parent.postMessage({type:'nyx:alt-prime'},'*')}catch{}
            try{top.postMessage({type:'nyx:alt-prime'},'*')}catch{}
            return;
          }
          if(event.altKey && !event.ctrlKey && !event.metaKey && event.location!==2 && (/^[1-9]$/.test(key) || ['l','d','t','w','r','arrowleft','arrowright','tab'].includes(key))){
            event.preventDefault();
            event.stopPropagation();
            try{parent.postMessage({type:'nyx:alt-shortcut',key,code:event.code||'',location:event.location||0,shiftKey:!!event.shiftKey},'*')}catch{}
            try{top.postMessage({type:'nyx:alt-shortcut',key,code:event.code||'',location:event.location||0,shiftKey:!!event.shiftKey},'*')}catch{}
            return;
          }
          if(event.key==='Escape') doc.documentElement.classList.remove('nyx-pointer-captured');
        },true);
      }catch{}
    }
    function installGamePointerBridge(){
      try{
        installPointerBridgeInDocument(frame.contentDocument);
        frame.contentDocument?.querySelectorAll?.('iframe')?.forEach(child=>{
          try{installPointerBridgeInDocument(child.contentDocument)}catch{}
        });
      }catch{}
    }
    frame.addEventListener('load',()=>{
      setTimeout(focusGameFrame,80);
      setTimeout(installGamePointerBridge,250);
      setTimeout(installGamePointerBridge,1200);
    });
    setInterval(installGamePointerBridge,1800);
    frame.addEventListener('pointerdown',focusGameFrame,{capture:true});
    document.addEventListener('pointerdown',focusGameFrame,true);
    document.addEventListener('wheel',event=>{
      if(event.ctrlKey) event.preventDefault();
    },{capture:true,passive:false});
    document.addEventListener('keydown',event=>{
      const key=String(event.key || '').toLowerCase();
      if(event.altKey && !event.ctrlKey && !event.metaKey && event.location!==2 && key==='alt'){
        event.preventDefault();
        event.stopPropagation();
        try{parent.postMessage({type:'nyx:alt-prime'},'*')}catch{}
        try{top.postMessage({type:'nyx:alt-prime'},'*')}catch{}
        return;
      }
      if(event.altKey && !event.ctrlKey && !event.metaKey && event.location!==2 && (/^[1-9]$/.test(key) || ['l','d','t','w','r','arrowleft','arrowright','tab'].includes(key))){
        event.preventDefault();
        event.stopPropagation();
        try{parent.postMessage({type:'nyx:alt-shortcut',key,code:event.code||'',location:event.location||0,shiftKey:!!event.shiftKey},'*')}catch{}
        try{top.postMessage({type:'nyx:alt-shortcut',key,code:event.code||'',location:event.location||0,shiftKey:!!event.shiftKey},'*')}catch{}
        return;
      }
      if((event.ctrlKey || event.metaKey) && ['+','=','-','_','0'].includes(key)){
        event.preventDefault();
        event.stopPropagation();
      }
    },true);
    const params=new URLSearchParams(location.search);
    const game=String(params.get('game') || '').replace(/^\/+/,'');
    let progressTimer=0;
    let gameLaunched=false;
    let gameLoadStarted=0;

    function setGameProgress(value,label='Loading'){
      const percent=Math.max(0,Math.min(100,Math.round(value)));
      progressLabel.textContent=percent>=100 ? 'Launched' : label;
      progressPercent.textContent=`${percent}%`;
      progressFill.style.width=`${percent}%`;
      loading.classList.remove('hidden');
    }

    function startGameProgress(){
      clearInterval(progressTimer);
      gameLaunched=false;
      gameLoadStarted=performance.now();
      let progress=8;
      setGameProgress(progress);
      progressTimer=setInterval(()=>{
        progress=Math.min(94,progress + Math.max(1,(96-progress)*.1));
        setGameProgress(progress);
      },210);
    }

    function finishGameProgress(){
      if(gameLaunched) return;
      if(!gameSurfaceReady()){
        if(performance.now()-gameLoadStarted>11000){
          fail('This game loaded a blank screen. One of its required files is missing or blocked.');
          return;
        }
        setTimeout(finishGameProgress,700);
        return;
      }
      gameLaunched=true;
      clearInterval(progressTimer);
      setGameProgress(100,'Launched');
      parent.postMessage({type:'nyx:game-launched'},'*');
      setTimeout(()=>loading.classList.add('hidden'),650);
    }

    function fail(message){
      clearInterval(progressTimer);
      status.innerHTML='';
      status.append(document.createTextNode(String(message || 'This game failed to load.')));
      const retry=document.createElement('button');
      retry.type='button';
      retry.textContent='Retry';
      retry.addEventListener('click',()=>location.reload());
      const library=document.createElement('button');
      library.type='button';
      library.textContent='Open game library';
      library.addEventListener('click',()=>location.href='/assets/games/index.html');
      status.append(document.createElement('br'),retry,document.createTextNode(' '),library);
      loading.classList.remove('hidden');
    }
    function gameSurfaceReady(){
      try{
        const doc=frame.contentDocument;
        if(!doc?.body) return false;
        const target=[...doc.querySelectorAll('canvas,object,embed,ruffle-player,ruffle-object,iframe,#game,#game-container,#unity-container,#unity-canvas,#ruffle,#player')]
          .find(el=>{
            const box=el.getBoundingClientRect?.();
            return box && box.width>40 && box.height>40 && getComputedStyle(el).display!=='none';
          });
        if(target) return true;
        return String(doc.body.textContent || '').replace(/\s+/g,' ').trim().length>40;
      }catch{
        return false;
      }
    }

    function safeGamePath(path){
      if(!path || path.includes('..') || !/^[a-z0-9_.-]+\.html$/i.test(path)) return '';
      return path;
    }

    function cleanGnMathHtml(html,path){
      const rawBase=`https://raw.githubusercontent.com/gn-math/html/main/${path}`;
      const baseUrl=rawBase.slice(0,rawBase.lastIndexOf('/') + 1);
      const repoRoot='https://raw.githubusercontent.com/gn-math/html/main/';
      const proxyUrl=url=>`${location.origin}/gn-math-proxy?url=${encodeURIComponent(url)}`;
      const sourceHtml=String(html || '');
      const baseHref=(sourceHtml.match(/<base\b[^>]*href=["']([^"']+)/i)?.[1] || baseUrl).trim();
      const toProxy=(raw,base=baseHref)=>{
        try{
          const value=String(raw || '').trim();
          const url=new URL(value.startsWith('/') ? value.slice(1) : value,value.startsWith('/') ? repoRoot : base);
          if(!['cdn.jsdelivr.net','raw.githubusercontent.com','rawcdn.githack.com','raw.githack.com'].includes(url.hostname)) return raw;
          if(/googletagmanager|google-analytics|googlesyndication|doubleclick|facebook|recaptcha|pagead|cdn\.r9x\.in/i.test(url.href)) return raw;
          return proxyUrl(url.href);
        }catch{
          return raw;
        }
      };
      const proxiedHtml=sourceHtml
        .replace(/<base\b[^>]*>/gi,'')
        .replace(/((?:src|href)=["'])(?![a-z][a-z0-9+.-]*:|\/\/|#|data:|blob:)([^"']+)/gi,(_match,prefix,raw)=>`${prefix}${toProxy(raw)}`)
        .replace(/((?:dataUrl|codeUrl|asmUrl|memUrl|frameworkUrl|loaderUrl)\s*[:=]\s*["'])(?![a-z][a-z0-9+.-]*:|\/\/|#|data:|blob:)([^"']+)/gi,(_match,prefix,raw)=>`${prefix}${toProxy(raw)}`)
        .replace(/https?:\/\/[^\s"'<>\\)]+/gi,raw=>toProxy(raw));
      const guard=`<script>
        (() => {
          const ready=()=>parent.postMessage({type:'gn-math:ready'},'*');
          const fail=(message,url='')=>parent.postMessage({type:'gn-math:error',message,url},'*');
          const ignorable=/googletagmanager|google-analytics|googlesyndication|doubleclick|facebook|recaptcha|cdn\\.r9x\\.in|pagead/i;
          const important=/\\.(?:wasm|data|unityweb|json|swf|zip|7z|js)(?:[?#]|$)|\\/Build\\//i;
          const repoRoot='https://raw.githubusercontent.com/gn-math/html/main/';
          const prox='${location.origin}/gn-math-proxy?url=';
          const proxHosts=['cdn.jsdelivr.net','raw.githubusercontent.com','rawcdn.githack.com','raw.githack.com'];
          const own=url=>{
            try{
              const raw=String(url || '').trim();
              if(!raw || raw.startsWith('#') || /^(?:javascript|data|blob|about):/i.test(raw)) return raw || 'about:blank';
              const parsed=new URL(raw.startsWith('/') ? raw.slice(1) : raw,raw.startsWith('/') ? repoRoot : (document.baseURI || repoRoot));
              if(ignorable.test(parsed.href)) return 'about:blank';
              if(proxHosts.includes(parsed.hostname)) return prox+encodeURIComponent(parsed.href);
              return parsed.href;
            }catch{return url}
          };
          const nativeFetch=window.fetch?.bind(window);
          if(nativeFetch) window.fetch=(input,init)=>{
            try{
              if(input instanceof Request) return nativeFetch(new Request(own(input.url),input),init);
              return nativeFetch(own(input),init);
            }catch{return nativeFetch(input,init)}
          };
          const nativeOpen=XMLHttpRequest.prototype.open;
          XMLHttpRequest.prototype.open=function(method,url,...rest){return nativeOpen.call(this,method,own(url),...rest)};
          const NativeWorker=window.Worker;
          if(NativeWorker) window.Worker=function(url,opts){return new NativeWorker(own(url),opts)};
          window.open=(url)=>{ if(url) location.href=url; return null; };
          window.addEventListener('load',()=>setTimeout(ready,650));
          document.addEventListener('DOMContentLoaded',()=>setTimeout(ready,1800));
          setTimeout(ready,4500);
          window.addEventListener('error',event=>{
            const target=event.target;
            const url=target && (target.src || target.href);
            if(url && important.test(String(url)) && !ignorable.test(String(url))) fail('A required game file failed to load.',url);
          },true);
        })();
      <\/script>`;
      let output=proxiedHtml
        .replace(/<script\b[^>]*src=["']\/js\/main\.js["'][^>]*>\s*<\/script>/gi,'')
        .replace(/<script\b[^>]*googletagmanager[^>]*>[\s\S]*?<\/script>/gi,'')
        .replace(/<script\b[^>]*google-analytics[^>]*>[\s\S]*?<\/script>/gi,'')
        .replace(/<script\b[^>]*(?:pagead2|googlesyndication|doubleclick|connect\.facebook|cdn\.r9x\.in)[^>]*>[\s\S]*?<\/script>/gi,'')
        .replace(/<script\b[^>]*>[\s\S]*?(?:gtag|dataLayer|adsbygoogle|googletag|fbq|facebook|doubleclick|r9x)[\s\S]*?<\/script>/gi,'');
      if(!/<base\b/i.test(output)){
        output=/<head([^>]*)>/i.test(output)
          ? output.replace(/<head([^>]*)>/i,`<head$1><base href="${baseUrl}">`)
          : `<base href="${baseUrl}">${output}`;
      }
      return /<head([^>]*)>/i.test(output)
        ? output.replace(/<head([^>]*)>/i,`<head$1>${safeFitScript()}${guard}`)
        : `${safeFitScript()}${guard}${output}`;
    }
    function safeFitScript(){
      return `<style>html,body{width:100%!important;height:100%!important;margin:0!important;padding:0!important;overflow:hidden!important;background:#05070d!important}.ads,.ad,.adsbygoogle,iframe[src*="googlesyndication"],iframe[src*="doubleclick"],iframe[src*="recaptcha"]{display:none!important;pointer-events:none!important}html.nyx-pointer-captured,html.nyx-pointer-captured *{cursor:none!important}</style><script>(()=>{const q='canvas,object,embed,ruffle-player,ruffle-object,iframe,#game,#game-container,#unity-container,#unity-canvas,#ruffle,#player';const visible=el=>{const r=el.getBoundingClientRect();return r.width>20&&r.height>20&&getComputedStyle(el).display!=='none'};const editing=()=>{const a=document.activeElement;return !!(a&&(a.isContentEditable||a.matches?.('input,textarea,select,[contenteditable=\"\"],[contenteditable=\"true\"]')))};const fit=()=>{try{if(editing())return;document.documentElement.style.setProperty('overflow','hidden','important');document.body?.style.setProperty('overflow','hidden','important');const target=[...document.querySelectorAll(q)].filter(visible).sort((a,b)=>{const ar=a.getBoundingClientRect(),br=b.getBoundingClientRect();return br.width*br.height-ar.width*ar.height})[0];if(!target)return;const r=target.getBoundingClientRect();const baseW=Number(target.getAttribute('width'))||r.width||innerWidth;const baseH=Number(target.getAttribute('height'))||r.height||innerHeight;const ratio=Math.max(.05,baseW/baseH);let w=innerWidth,h=innerHeight;if(w/h>ratio)w=h*ratio;else h=w/ratio;target.style.setProperty('position','fixed','important');target.style.setProperty('left','50%','important');target.style.setProperty('top','50%','important');target.style.setProperty('width',Math.round(w)+'px','important');target.style.setProperty('height',Math.round(h)+'px','important');target.style.setProperty('margin','0','important');target.style.setProperty('max-width','100vw','important');target.style.setProperty('max-height','100vh','important');target.style.setProperty('transform','translate(-50%,-50%)','important');target.style.setProperty('transform-origin','center center','important');target.style.setProperty('object-fit','contain','important');target.style.setProperty('pointer-events','auto','important')}catch{}};const capture=e=>{try{if(editing())return;const target=e.target?.closest?.(q)||document.querySelector(q)||document.documentElement;target.focus?.({preventScroll:true});setTimeout(()=>{try{if(!document.pointerLockElement&&target.requestPointerLock)target.requestPointerLock({unadjustedMovement:true})}catch{try{target.requestPointerLock?.()}catch{}}document.documentElement.classList.add('nyx-pointer-captured')},0)}catch{}};document.addEventListener('pointerdown',capture,true);document.addEventListener('click',capture,true);document.addEventListener('pointerlockchange',()=>document.documentElement.classList.toggle('nyx-pointer-captured',!!document.pointerLockElement));addEventListener('keydown',e=>{if(e.key==='Escape')document.documentElement.classList.remove('nyx-pointer-captured')},true);addEventListener('load',()=>{fit();setTimeout(fit,350);setTimeout(fit,1400)});addEventListener('resize',fit);document.addEventListener('DOMContentLoaded',fit);setInterval(fit,350)})()<\/script>`;
    }

    window.addEventListener('message',event=>{
      if(event.source!==frame.contentWindow) return;
      if(event.data?.type==='gn-math:ready'){
        finishGameProgress();
        return;
      }
      if(event.data?.type==='gn-math:error'){
        const url=event.data.url ? ` (${event.data.url})` : '';
        fail(`${event.data.message || 'This game failed to load.'}${url}`);
      }
    });
    frame.addEventListener('load',()=>setTimeout(finishGameProgress,1800));

    const gamePath=safeGamePath(game);
    if(!gamePath){
      fail('Missing GN Math game path.');
    }else{
      startGameProgress();
      const rawUrl=`https://raw.githubusercontent.com/gn-math/html/main/${encodeURIComponent(gamePath)}`;
      setGameProgress(22);
      fetch(`/gn-math-fetch?path=${encodeURIComponent(gamePath)}`,{cache:'no-store'})
        .then(response=>{
          if(response.ok){
            setGameProgress(48);
            return response;
          }
          setGameProgress(34);
          return fetch(rawUrl,{cache:'no-store'});
        })
        .then(response=>{
          if(!response.ok) throw new Error(`HTTP ${response.status}`);
          setGameProgress(58);
          return response.text();
        })
        .then(html=>{
          setGameProgress(76);
          frame.srcdoc=cleanGnMathHtml(html,gamePath);
          setGameProgress(88);
          setTimeout(finishGameProgress,7000);
        })
        .catch(error=>fail(`Could not load GN Math game: ${error?.message || error || 'Network error'}`));
    }
  </script>
</body>
</html>
