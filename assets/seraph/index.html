<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seraph Games</title>
  <style>
    :root{
      --bg:#0b0f17;
      --panel:rgba(15,23,42,.72);
      --text:#f8fafc;
      --muted:#a8b3c7;
      --line:#7dd3fc;
    }
    *{box-sizing:border-box;font-weight:400!important;font-style:normal!important}
    body{
      margin:0;
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      font-family:Outfit,Arial,sans-serif;
    }
    header{
      position:sticky;
      top:0;
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:18px 20px;
      background:rgba(11,15,23,.92);
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(16px);
    }
    h1{
      margin:0;
      font-size:26px;
      font-weight:400;
      letter-spacing:0;
    }
    .source{
      margin-top:4px;
      color:var(--muted);
      font-size:13px;
    }
    .search{
      width:min(360px,42vw);
      border:1px solid var(--line);
      border-radius:12px;
      background:#121722;
      color:var(--text);
      padding:11px 13px;
      font:inherit;
      outline:none;
    }
    main{padding:22px}
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
      gap:16px;
    }
    .card{
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:150px;
      padding:12px;
      border:1px solid rgba(125,211,252,.45);
      border-radius:14px;
      background:var(--panel);
      color:var(--text);
      text-align:left;
      cursor:pointer;
      transition:transform .12s ease,border-color .12s ease;
    }
    .card:hover{
      transform:scale(1.015);
      border-color:var(--line);
    }
    .thumb{
      width:100%;
      aspect-ratio:16/10;
      object-fit:cover;
      border-radius:10px;
      background:#111827;
    }
    .thumb.broken{
      display:none;
    }
    .thumb-fallback{
      width:100%;
      aspect-ratio:16/10;
      display:none;
      place-items:center;
      border-radius:10px;
      background:
        radial-gradient(circle at 20% 20%,rgba(125,211,252,.36),transparent 32%),
        radial-gradient(circle at 82% 76%,rgba(168,85,247,.28),transparent 34%),
        linear-gradient(135deg,#111827,#1e293b);
      color:#7dd3fc;
      font-size:28px;
      font-weight:400;
    }
    .thumb-fallback.generated{
      display:grid;
    }
    .thumb.broken + .thumb-fallback{
      display:grid;
    }
    .name{
      font-size:14px;
      line-height:1.25;
    }
    .empty{
      display:none;
      color:var(--muted);
      padding:26px 0;
    }
    @media (max-width:640px){
      header{align-items:stretch;flex-direction:column}
      .search{width:100%}
      main{padding:14px}
      .grid{grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:12px}
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Seraph Games</h1>
      <div class="source">Stable local game library.</div>
    </div>
    <input id="search" class="search" placeholder="Search Seraph games" autocomplete="off">
  </header>
  <main>
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty">No games found.</div>
  </main>
  <script>
    const grid=document.getElementById('grid');
    const empty=document.getElementById('empty');
    const search=document.getElementById('search');
    let games=[];

    function titleFromPath(path){
      const clean=String(path || '').replace(/\/index\.html$/,'').split('/').filter(Boolean).pop() || 'Game';
      return clean.replace(/[-_]+/g,' ').replace(/\b\w/g,letter=>letter.toUpperCase());
    }

    function prettyTitle(game){
      const fromPath=titleFromPath(game.path);
      const raw=String(game.title || '').trim();
      const compact=/^[a-z0-9]+$/i.test(raw) && /[a-z]/i.test(raw);
      const text=compact ? fromPath : (raw || fromPath);
      return text
        .replace(/[-_]+/g,' ')
        .replace(/([a-z])([0-9])/gi,'$1 $2')
        .replace(/([0-9])([a-z])/gi,'$1 $2')
        .replace(/\s+/g,' ')
        .trim()
        .replace(/\b\w/g,letter=>letter.toUpperCase());
    }

    function slugTitle(title){
      return String(title || '').toLowerCase().replace(/[^a-z0-9]+/g,'').trim();
    }

    function assetUrl(game){
      const thumbnail=String(game?.thumbnail || '').trim().replace(/^\/+/,'');
      if(thumbnail) return `/seraph-asset?path=${encodeURIComponent(thumbnail)}`;
      return '';
    }

    function gameUrl(path){
      const clean=String(path || '').replace(/^\/+/,'');
      return new URL(`/assets/seraph/play.html?game=${encodeURIComponent(clean)}`,location.origin).href;
    }

    function isPlayablePath(path){
      return !!path && /\.html?$/i.test(String(path)) && !/(^|\/)(?:404|408)\.html$/i.test(String(path));
    }

    function openGame(url){
      parent.postMessage({type:'nyx:game-loading'},'*');
      location.href=url;
    }

    function render(){
      const term=search.value.trim().toLowerCase();
      const shown=games.filter(game=>!term || game.title.toLowerCase().includes(term));
      grid.innerHTML=shown.map(game=>`
        <button class="card" type="button" data-url="${game.url}">
          ${game.thumbnail ? `<img class="thumb" alt="" loading="lazy" src="${game.thumbnail}">` : '<span class="thumb broken" aria-hidden="true"></span>'}
          <span class="thumb-fallback ${game.thumbnail ? '' : 'generated'}" aria-hidden="true">${game.title.slice(0,1).toUpperCase()}</span>
          <span class="name">${game.title}</span>
        </button>
      `).join('');
      empty.style.display=shown.length ? 'none' : 'block';
    }

    grid.addEventListener('click',event=>{
      const card=event.target.closest('[data-url]');
      if(card) openGame(card.dataset.url);
    });
    grid.addEventListener('error',event=>{
      if(event.target?.classList?.contains('thumb')) event.target.classList.add('broken');
    },true);
    search.addEventListener('input',render);

    fetch('/assets/seraph/games.json')
      .then(response=>response.json())
      .then(data=>{
        const entries=Array.isArray(data) ? data : (Array.isArray(data.games) ? data.games : []);
        games=entries.filter(game=>isPlayablePath(game.path)).map(game=>({
          title:prettyTitle(game),
          url:gameUrl(game.path),
          thumbnail:assetUrl(game)
        })).sort((a,b)=>a.title.localeCompare(b.title));
        render();
      })
      .catch(()=>{
        empty.textContent='Could not load the Seraph game list.';
        empty.style.display='block';
      });
  </script>
</body>
</html>
