<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seraph Game</title>
  <style>
    html,body{
      height:100%;
      margin:0;
      background:#0b0f17;
      color:#f8fafc;
      font-family:Raleway,Arial,sans-serif;
    }
    .loading{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      padding:24px;
      text-align:center;
      z-index:2;
      background:#0b0f17;
    }
    .loading.hidden{display:none}
    .box{
      max-width:520px;
      border:1px solid #7dd3fc;
      border-radius:16px;
      padding:24px;
      background:#111827;
    }
    .game-frame{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      background:#0b0f17;
    }
  </style>
</head>
<body>
  <div class="loading"><div class="box" id="status">Loading Seraph game...</div></div>
  <iframe id="gameFrame" class="game-frame" title="Seraph game" sandbox="allow-same-origin allow-scripts allow-forms allow-modals allow-pointer-lock allow-popups allow-downloads allow-presentation"></iframe>
  <script>
    const cdnRoot='https://cdn.jsdelivr.net/gh/a456pur/seraph@main';
    const loading=document.querySelector('.loading');
    const status=document.getElementById('status');
    const frame=document.getElementById('gameFrame');
    const params=new URLSearchParams(location.search);
    const game=String(params.get('game') || '').replace(/^\/+/,'');
    let lastGameHtml='';
    let lastBaseUrl='';
    let restoring=false;
    function fail(message){
      status.textContent=message;
      loading.classList.remove('hidden');
    }
    function safeGamePath(path){
      if(!path || path.includes('..') || !/^[a-z0-9_./-]+$/i.test(path)) return '';
      if(/(^|\/)(?:404|408)\.html$/i.test(path)) return '';
      return path.endsWith('.html') ? path : `${path.replace(/\/+$/,'')}/index.html`;
    }
    function rewriteSeraphHtml(html){
      return String(html || '')
        .replace(/(["'(\s=])\/games\//g, `$1${cdnRoot}/games/`)
        .replace(/(["'(\s=])\/images\//g, `$1${cdnRoot}/images/`)
        .replace(/(["'(\s=])\/js\//g, `$1${cdnRoot}/js/`)
        .replace(/(["'(\s=])\/css\//g, `$1${cdnRoot}/css/`)
        .replace(/(["'(\s=])\/assets\//g, `$1${cdnRoot}/assets/`);
    }
    function withSeraphBase(html,baseUrl){
      const baseTag=`<base href="${baseUrl}">`;
      return /<head([^>]*)>/i.test(html)
        ? html.replace(/<head([^>]*)>/i,`<head$1>${baseTag}`)
        : `${baseTag}${html}`;
    }
    function loadGameSrcdoc(html,baseUrl){
      lastGameHtml=html;
      lastBaseUrl=baseUrl;
      frame.srcdoc=withSeraphBase(rewriteSeraphHtml(html),baseUrl);
      loading.classList.add('hidden');
    }
    frame.addEventListener('load',()=>{
      if(restoring || !lastGameHtml) return;
      try{
        const current=frame.contentWindow.location;
        const sameOrigin=current.origin===location.origin;
        const nyxRoot=sameOrigin && (current.pathname==='/' || /\/index\.html$/i.test(current.pathname));
        if(nyxRoot){
          restoring=true;
          frame.srcdoc=withSeraphBase(rewriteSeraphHtml(lastGameHtml),lastBaseUrl);
          setTimeout(()=>{restoring=false},250);
        }
      }catch{}
    });
    async function fetchSeraphHtml(gamePath, htmlUrl){
      const localUrl=`/seraph-fetch?path=${encodeURIComponent(gamePath)}`;
      try{
        const local=await fetch(localUrl,{cache:'no-store'});
        if(local.ok) return await local.text();
      }catch{}
      const response=await fetch(htmlUrl,{cache:'no-store'});
      if(!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.text();
    }
    const gamePath=safeGamePath(game);
    if(!gamePath){
      fail('Missing Seraph game path.');
    }else{
      const htmlUrl=`${cdnRoot}/games/${gamePath}`;
      const baseUrl=htmlUrl.slice(0,htmlUrl.lastIndexOf('/') + 1);
      fetchSeraphHtml(gamePath,htmlUrl)
        .then(html=>loadGameSrcdoc(html,baseUrl))
        .catch(error=>fail(`Could not load Seraph game: ${error.message}`));
    }
  </script>
</body>
</html>
