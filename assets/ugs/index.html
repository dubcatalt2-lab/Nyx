<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pirate Cove</title>
<style>
:root{color-scheme:dark;--bg:#070911;--panel:rgba(255,255,255,.08);--line:rgba(255,255,255,.15);--text:#f8fafc;--muted:#a8b1bd;--accent:#67e8f9}
*{box-sizing:border-box}
html,body{width:100%;min-height:100%;margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at 18% 0%,rgba(251,191,36,.16),transparent 30%),radial-gradient(circle at 80% 12%,rgba(103,232,249,.18),transparent 34%),linear-gradient(180deg,#0b1322,#111827 44%,#07111f);color:var(--text)}
body{padding:22px}
header{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:0 auto 18px;max-width:1180px}
h1{font-size:clamp(28px,4vw,54px);line-height:1;margin:0;font-weight:900}
p{margin:8px 0 0;color:var(--muted)}
.toolbar{display:flex;gap:10px;align-items:center}
input{width:min(420px,48vw);border:1px solid var(--line);background:rgba(255,255,255,.1);color:var(--text);border-radius:12px;padding:12px 14px;outline:none}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(103,232,249,.16)}
.count{color:var(--muted);font-size:13px;white-space:nowrap}
.grid{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(178px,1fr));gap:14px}
.game{min-height:168px;border:1px solid var(--line);border-radius:14px;background:linear-gradient(135deg,rgba(255,255,255,.11),rgba(255,255,255,.045));color:var(--text);text-decoration:none;display:grid;grid-template-rows:minmax(108px,1fr) auto;font-weight:850;overflow:hidden;position:relative;box-shadow:0 14px 36px rgba(0,0,0,.24),inset 0 1px 0 rgba(255,255,255,.09);transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease}
.game::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(251,191,36,.12),rgba(103,232,249,.14) 48%,transparent 74%);opacity:0;transition:opacity .18s}
.game:hover::before,.game:focus-visible::before{opacity:1}
.game:hover,.game:focus-visible{transform:translateY(-2px);border-color:rgba(103,232,249,.55);box-shadow:0 18px 42px rgba(0,0,0,.32),0 0 0 3px rgba(103,232,249,.1)}
.cover{position:relative;min-height:108px;background:#111827;overflow:hidden;isolation:isolate}
.cover img{width:100%;height:100%;min-height:108px;display:block;object-fit:cover;color:transparent;font-size:0;filter:saturate(1.06) contrast(1.03)}
.cover::before{content:"";position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,255,255,.16),transparent 42%),linear-gradient(0deg,rgba(3,7,18,.52),transparent 62%);pointer-events:none}
.game-title{position:relative;min-height:54px;padding:10px 12px 12px;display:flex;align-items:center;background:rgba(10,16,28,.72);border-top:1px solid rgba(255,255,255,.1);overflow-wrap:anywhere}
.empty{max-width:1180px;margin:40px auto;color:var(--muted);display:none}
@media(max-width:700px){body{padding:14px}header{display:block}.toolbar{margin-top:14px}input{width:100%}.grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px}.game{min-height:150px}.cover{min-height:96px}}
</style>
</head>
<body>
<header>
  <div>
    <h1>Pirate Cove</h1>
    <p>Pick a game and set sail.</p>
  </div>
  <div class="toolbar">
    <input id="search" type="search" autocomplete="off" placeholder="Search games">
    <span class="count" id="count">Loading...</span>
  </div>
</header>
<main class="grid" id="grid"></main>
<p class="empty" id="empty">No games found.</p>
<script>
const grid=document.getElementById('grid');
const search=document.getElementById('search');
const count=document.getElementById('count');
const empty=document.getElementById('empty');
let games=[];
function cleanTitle(title){
  return String(title||'Game').replace(/([a-z])([0-9])/g,'$1 $2').replace(/([0-9])([a-z])/g,'$1 $2').replace(/\s+/g,' ').trim();
}
function thumbName(gamePath){
  return String(gamePath || '').replace(/\.[^.]+$/,'').replace(/[^a-z0-9]+/gi,'-').replace(/^-+|-+$/g,'').toLowerCase()+'.png';
}
function fallbackThumb(title){
  const safeTitle=escapeHtml(cleanTitle(title)).slice(0,42);
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="420" height="236" viewBox="0 0 420 236">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#172033"/><stop offset=".55" stop-color="#22324b"/><stop offset="1" stop-color="#31536b"/></linearGradient>
<linearGradient id="shine" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#67e8f9" stop-opacity=".26"/><stop offset="1" stop-color="#fbbf24" stop-opacity=".16"/></linearGradient>
</defs>
<rect width="420" height="236" fill="url(#bg)"/>
<path d="M0 190 C75 108 142 138 190 86 C248 22 322 48 420 0 L420 236 L0 236 Z" fill="url(#shine)"/>
<circle cx="344" cy="56" r="34" fill="#fbbf24" opacity=".16"/>
<text x="210" y="104" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="28" font-weight="900" fill="#f8fafc">Pirate Cove</text>
<text x="210" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#dbeafe">${safeTitle}</text>
</svg>`;
  return 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
}
function render(){
  const term=search.value.trim().toLowerCase();
  const shown=games.filter(game=>!term || game.title.toLowerCase().includes(term));
  grid.innerHTML=shown.map(game=>{
    const title=cleanTitle(game.title);
    return `<a class="game" href="${encodeURI(game.path)}"><div class="cover"><img loading="lazy" decoding="async" src="thumbs/${escapeAttr(thumbName(game.path))}" alt="" onerror="this.onerror=null;this.src=fallbackThumb('${escapeJs(title)}');"></div><span class="game-title">${escapeHtml(title)}</span></a>`;
  }).join('');
  count.textContent=`${shown.length} / ${games.length}`;
  empty.style.display=shown.length?'none':'block';
}
function escapeHtml(value){
  return String(value).replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
}
function escapeAttr(value){
  return escapeHtml(value);
}
function escapeJs(value){
  return String(value).replace(/[\\'"]/g,char=>char==='\\'?'\\\\':'\\'+char).replace(/\r?\n/g,' ');
}
fetch('games.json')
  .then(response=>{
    if(!response.ok) throw new Error('Could not load game list');
    return response.json();
  })
  .then(list=>{
    games=Array.isArray(list)?list:[];
    render();
    search.focus();
  })
  .catch(error=>{
    count.textContent='Failed to load';
    empty.textContent=error.message;
    empty.style.display='block';
  });
search.addEventListener('input',render);
</script>
</body>
</html>
