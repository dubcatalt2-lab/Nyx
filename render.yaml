services:
  - type: web
    name: nyx-temporary
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev && npm run check:deploy
    startCommand: npm start
    healthCheckPath: /healthz
    maxShutdownDelaySeconds: 30
    envVars:
      - key: NODE_ENV
        value: production
      - key: WISP_URL
        sync: false
